description: Co-op Automated Raid Experience

context:
  - title: The Ultimate Showdown
    body: Team up to challenge an automated Raid Deck representing Deathwing the Destroyer.
  - title: Play as the Aspects
    body: In a unique twist, players can use special oversized cards to take on the roles of the Dragon Aspects—Alexstrasza, Ysera, Nozdormu, or Kalecgos—to battle Deathwing.
  - title: Adjustable Difficulty
    body: The set includes Tentacle cards that can be added to ratchet up the difficulty for experienced players, making it flexible for varied skill levels.
  - title: New "Chaos Format" Variant
    body: This set introduces a "Chaos" format, which operates similar to a Commander format with single-copy restrictions, allowing for fresh deck-building strategies.

