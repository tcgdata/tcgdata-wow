set_name:
  type: string
  required: true
  
set_type:
  type: string
  required: true
  allowed: ['set', 'raid', 'starter', 'promo', 'craft', 'dungeon', 'badge', 'token']

set_lex:
  type: string
  nullable: true

card_subtotal:
  type: integer

card_total:
  type: integer

date_release:
  type: string
  regex: '^[0-9]{4}-[0-9]{2}$'

collection_id:
  type: string
  required: true